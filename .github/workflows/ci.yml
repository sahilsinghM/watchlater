name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile
      - name: Test
        run: bun test
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: bun run lint
      - name: Build
        run: bun run build
