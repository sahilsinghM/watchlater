<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VideoSense — UI kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="kit.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.544.0/dist/umd/lucide.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
<script>
  // Re-draw Lucide icons when React adds new icon placeholders.
  // Guard against the observer re-firing on lucide's own DOM swaps.
  let scheduled = false;
  function draw() {
    const root = document.getElementById("root");
    if (!root || !window.lucide) return;
    if (!root.querySelector("[data-lucide]")) return; // nothing new to draw
    mo.disconnect();
    window.lucide.createIcons();
    mo.observe(root, { childList: true, subtree: true });
  }
  function schedule() {
    if (scheduled) return;
    scheduled = true;
    requestAnimationFrame(() => { scheduled = false; draw(); });
  }
  const mo = new MutationObserver(schedule);
  function start() {
    const root = document.getElementById("root");
    if (!root) return;
    mo.observe(root, { childList: true, subtree: true });
    draw();
  }
  if (document.readyState === "complete") start();
  else window.addEventListener("load", start);
</script>
</body>
</html>
