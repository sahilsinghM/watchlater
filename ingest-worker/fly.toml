# Fly.io config for the VideoSense ingest worker.
# Rename `app` if you like, or let `fly launch` set it. Change `primary_region`
# to one near your Supabase project for lower DB latency.
app = "videosense-ingest-worker"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  # Keep one machine always running. The /ingest handler returns 202 immediately
  # and finishes the lesson in the background, so auto-stop (which keys off
  # in-flight requests) would kill jobs mid-generation. Do NOT enable auto-stop.
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
